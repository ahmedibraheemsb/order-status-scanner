<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Order Status Updater</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0c0c0d;
            --bg-card: #161618;
            --bg-input: #1e1e21;
            --border: #2a2a2e;
            --text: #f5f5f5;
            --text-dim: #8b8b8f;
            --accent: #f43f5e;
            --accent-glow: rgba(244, 63, 94, 0.15);
            --success: #22c55e;
            --success-glow: rgba(34, 197, 94, 0.15);
            --error: #ef4444;
            --error-glow: rgba(239, 68, 68, 0.15);
            --scanner: #00d4ff;
            --orange: #f59e0b;
            --orange-glow: rgba(245, 158, 11, 0.15);
            --blue: #3b82f6;
            --blue-glow: rgba(59, 130, 246, 0.15);
            --purple: #8b5cf6;
            --purple-glow: rgba(139, 92, 246, 0.15);
            --pink: #ec4899;
            --pink-glow: rgba(236, 72, 153, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'IBM Plex Sans Arabic', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 1rem;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .header h1 {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 0.3rem;
        }

        .header p {
            color: var(--text-dim);
            font-size: 0.85rem;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1rem;
        }

        .card-title {
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Status Selector */
        .status-selector {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.5rem;
            margin-bottom: 0.5rem;
        }

        .status-btn {
            padding: 0.6rem 0.3rem;
            border-radius: 10px;
            font-family: inherit;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
            border: 2px solid var(--border);
            background: var(--bg-input);
            color: var(--text-dim);
            transition: all 0.2s;
            text-align: center;
        }

        .status-btn:hover {
            border-color: var(--text-dim);
        }

        .status-btn.active {
            transform: scale(1.02);
        }

        .status-btn .icon {
            font-size: 1.1rem;
            display: block;
            margin-bottom: 0.2rem;
        }

        /* Status Colors */
        .status-btn.shipped.active {
            border-color: var(--scanner);
            background: rgba(0, 212, 255, 0.15);
            color: var(--scanner);
        }

        .status-btn.delivered.active {
            border-color: var(--success);
            background: var(--success-glow);
            color: var(--success);
        }

        .status-btn.returned.active {
            border-color: var(--orange);
            background: var(--orange-glow);
            color: var(--orange);
        }

        .status-btn.cancelled.active {
            border-color: var(--error);
            background: var(--error-glow);
            color: var(--error);
        }

        .status-btn.ready-to-ship.active {
            border-color: var(--purple);
            background: var(--purple-glow);
            color: var(--purple);
        }

        .current-status {
            text-align: center;
            padding: 0.5rem;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-top: 0.5rem;
        }

        .current-status.shipped { background: rgba(0, 212, 255, 0.15); color: var(--scanner); }
        .current-status.delivered { background: var(--success-glow); color: var(--success); }
        .current-status.returned { background: var(--orange-glow); color: var(--orange); }
        .current-status.cancelled { background: var(--error-glow); color: var(--error); }
        .current-status.ready-to-ship { background: var(--purple-glow); color: var(--purple); }

        /* Courier Selector */
        .courier-selector {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.5rem;
        }

        .courier-btn {
            padding: 0.7rem 0.5rem;
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            border: 2px solid var(--border);
            background: var(--bg-input);
            color: var(--text-dim);
            transition: all 0.2s;
            text-align: center;
        }

        .courier-btn:hover {
            border-color: var(--text-dim);
        }

        .courier-btn.active {
            border-color: var(--pink);
            background: var(--pink-glow);
            color: var(--pink);
        }

        .courier-display {
            text-align: center;
            padding: 0.5rem;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-top: 0.5rem;
            background: var(--pink-glow);
            color: var(--pink);
        }

        /* Scanner */
        #reader {
            width: 100%;
            border-radius: 10px;
            overflow: hidden;
        }

        .scan-status {
            text-align: center;
            padding: 0.6rem;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-top: 0.75rem;
            background: var(--bg-input);
            color: var(--text-dim);
        }

        .scan-status.success {
            background: var(--success-glow);
            color: var(--success);
            animation: pulse 0.5s;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        .scanner-btn {
            width: 100%;
            padding: 0.85rem;
            border-radius: 10px;
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            border: 2px solid var(--scanner);
            background: rgba(0, 212, 255, 0.1);
            color: var(--scanner);
            margin-top: 0.75rem;
            transition: all 0.2s;
        }

        .scanner-btn.stop {
            background: var(--error);
            border-color: var(--error);
            color: white;
        }

        /* Scanned List */
        .counter-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.75rem;
        }

        .counter-text {
            font-size: 0.85rem;
            color: var(--text-dim);
        }

        .counter-text strong {
            color: var(--accent);
            font-size: 1rem;
        }

        .clear-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-dim);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.8rem;
            cursor: pointer;
        }

        .clear-btn:hover {
            border-color: var(--error);
            color: var(--error);
        }

        .scanned-list {
            max-height: 150px;
            overflow-y: auto;
            border: 1px solid var(--border);
            border-radius: 8px;
        }

        .scanned-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.65rem 0.85rem;
            border-bottom: 1px solid var(--border);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
        }

        .scanned-item:last-child {
            border-bottom: none;
        }

        .scanned-item.new {
            animation: highlight 1s ease;
        }

        @keyframes highlight {
            0% { background: var(--success-glow); }
            100% { background: transparent; }
        }

        .remove-btn {
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            padding: 0.3rem;
            font-size: 1rem;
        }

        .remove-btn:hover {
            color: var(--error);
        }

        .empty-list {
            padding: 1.5rem;
            text-align: center;
            color: var(--text-dim);
            font-size: 0.85rem;
        }

        /* Settings */
        .settings-toggle {
            width: 100%;
            background: none;
            border: 1px solid var(--border);
            color: var(--text-dim);
            padding: 0.6rem;
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.85rem;
            cursor: pointer;
            margin-bottom: 0.75rem;
        }

        .settings-content {
            display: none;
            margin-bottom: 1rem;
        }

        .settings-content.active {
            display: block;
        }

        .input-group {
            margin-bottom: 0.75rem;
        }

        .input-group label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-bottom: 0.3rem;
        }

        .input-group input {
            width: 100%;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.7rem;
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--accent);
        }

        /* Action Button */
        .btn-primary {
            width: 100%;
            padding: 1rem;
            border-radius: 10px;
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            background: var(--accent);
            color: white;
            margin-bottom: 0.75rem;
            transition: all 0.2s;
        }

        .btn-primary:hover {
            filter: brightness(1.1);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-primary.shipped { background: var(--scanner); }
        .btn-primary.delivered { background: var(--success); }
        .btn-primary.returned { background: var(--orange); }
        .btn-primary.cancelled { background: var(--error); }
        .btn-primary.ready-to-ship { background: var(--purple); }

        /* Results */
        .results {
            display: none;
        }

        .results.active {
            display: block;
        }

        .results-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        .stat-success { color: var(--success); }
        .stat-error { color: var(--error); }

        .results-list {
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid var(--border);
            border-radius: 8px;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            padding: 0.6rem 0.85rem;
            border-bottom: 1px solid var(--border);
            font-size: 0.85rem;
        }

        .result-item:last-child {
            border-bottom: none;
        }

        .result-status {
            padding: 0.2rem 0.6rem;
            border-radius: 10px;
            font-size: 0.75rem;
        }

        .result-pending { background: rgba(59,130,246,0.15); color: #3b82f6; }
        .result-success { background: var(--success-glow); color: var(--success); }
        .result-error { background: var(--error-glow); color: var(--error); }

        /* Progress */
        .progress-bar {
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            margin-bottom: 0.75rem;
            display: none;
        }

        .progress-bar.active {
            display: block;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 2px;
            transition: width 0.3s;
            width: 0%;
        }

        /* Manual Input */
        .manual-input {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.75rem;
        }

        .manual-input input {
            flex: 1;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.7rem;
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
        }

        .manual-input button {
            background: var(--success);
            border: none;
            border-radius: 8px;
            padding: 0 1rem;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
        }

        .spinner {
            width: 14px;
            height: 14px;
            border: 2px solid transparent;
            border-top-color: currentColor;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 1rem;
            left: 50%;
            transform: translateX(-50%);
            background: var(--success);
            color: white;
            padding: 0.6rem 1.2rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 100;
        }

        .toast.show {
            opacity: 1;
        }

        /* Summary Box */
        .summary-box {
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 0.75rem;
            margin-bottom: 0.75rem;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 0.3rem 0;
            font-size: 0.85rem;
        }

        .summary-label {
            color: var(--text-dim);
        }

        .summary-value {
            font-weight: 600;
        }

        .summary-value.status { color: var(--scanner); }
        .summary-value.courier { color: var(--pink); }
        .summary-value.count { color: var(--accent); }
    </style>
</head>
<body>
    <div class="toast" id="toast">✓ تم المسح</div>

    <div class="container">
        <header class="header">
            <h1>📦 Order Status Updater</h1>
            <p>تحديث حالة الأوردرات</p>
        </header>

        <!-- Status Selector -->
        <div class="card">
            <h2 class="card-title">📌 اختر الحالة</h2>
            <div class="status-selector">
                <button class="status-btn shipped active" onclick="selectStatus('shipped', 'Shipped', '🚚')">
                    <span class="icon">🚚</span>
                    Shipped
                </button>
                <button class="status-btn delivered" onclick="selectStatus('delivered', 'Delivered', '✅')">
                    <span class="icon">✅</span>
                    Delivered
                </button>
                <button class="status-btn returned" onclick="selectStatus('returned', 'Returned', '↩️')">
                    <span class="icon">↩️</span>
                    Returned
                </button>
                <button class="status-btn cancelled" onclick="selectStatus('cancelled', 'Cancelled', '❌')">
                    <span class="icon">❌</span>
                    Cancelled
                </button>
                <button class="status-btn ready-to-ship" onclick="selectStatus('ready-to-ship', 'Ready to Ship', '📦')">
                    <span class="icon">📦</span>
                    Ready to Ship
                </button>
            </div>
        </div>

        <!-- Courier Selector -->
        <div class="card" id="courierCard">
            <h2 class="card-title">🛵 اختر المندوب</h2>
            <div class="courier-selector">
                <button class="courier-btn active" data-courier="Bosta" onclick="selectCourier(this)">Bosta</button>
                <button class="courier-btn" data-courier="3laa" onclick="selectCourier(this)">3laa</button>
                <button class="courier-btn" data-courier="3bdo 3rafa" onclick="selectCourier(this)">3bdo 3rafa</button>
                <button class="courier-btn" data-courier="Kareem" onclick="selectCourier(this)">Kareem</button>
                <button class="courier-btn" data-courier="Mohamed Tarek" onclick="selectCourier(this)">Mohamed Tarek</button>
                <button class="courier-btn" data-courier="Magdy" onclick="selectCourier(this)">Magdy</button>
                <button class="courier-btn" data-courier="Abo Selim" onclick="selectCourier(this)">Abo Selim</button>
				<button class="courier-btn" data-courier="Waleed" onclick="selectCourier(this)">Waleed</button>
				<button class="courier-btn" data-courier="3bd Alrahman" onclick="selectCourier(this)">3bd Alrahman</button>
				<button class="courier-btn" data-courier="Abo Eyad" onclick="selectCourier(this)">Abo Eyad</button>

            </div>
        </div>

        <!-- Scanner -->
        <div class="card">
            <h2 class="card-title">📷 ماسح الباركود</h2>
            <div id="reader"></div>
            <div class="scan-status" id="scanStatus">اضغط لبدء المسح</div>
            <button class="scanner-btn" id="scannerBtn" onclick="toggleScanner()">
                📷 بدء المسح
            </button>
            
            <div class="manual-input">
                <input type="text" id="manualInput" placeholder="امسح الباركود هنا..." autofocus>
                <button onclick="addManualEntry()">+</button>
            </div>
            <p style="font-size: 0.75rem; color: var(--text-dim); margin-top: 0.5rem; text-align: center;">
                💡 Scanner Gun: امسح وسيتم الإضافة تلقائياً
            </p>
        </div>

        <!-- Scanned List -->
        <div class="card">
            <h2 class="card-title">📋 الأوردرات</h2>
            <div class="counter-bar">
                <span class="counter-text">العدد: <strong id="count">0</strong></span>
                <button class="clear-btn" onclick="clearList()">مسح الكل</button>
            </div>
            <div class="scanned-list" id="scannedList">
                <div class="empty-list">لم يتم مسح أي باركود بعد</div>
            </div>
        </div>

        <!-- Summary -->
        <div class="summary-box">
            <div class="summary-row">
                <span class="summary-label">الحالة:</span>
                <span class="summary-value status" id="summaryStatus">🚚 Shipped</span>
            </div>
            <div class="summary-row" id="courierRow">
                <span class="summary-label">المندوب:</span>
                <span class="summary-value courier" id="summaryCourier">🛵 Bosta</span>
            </div>
            <div class="summary-row">
                <span class="summary-label">عدد الأوردرات:</span>
                <span class="summary-value count" id="summaryCount">0</span>
            </div>
        </div>

        <!-- Settings -->
        <button class="settings-toggle" onclick="toggleSettings()">⚙️ الإعدادات</button>
        <div class="settings-content" id="settings">
            <div class="card">
                <div class="input-group">
                    <label>Flow Companion API Token</label>
                    <input type="password" id="apiToken" placeholder="أدخل الـ Token">
                </div>
            </div>
        </div>

        <!-- Action -->
        <button class="btn-primary shipped" id="updateBtn" onclick="startUpdate()">
            🚀 تحديث الكل
        </button>

        <div class="progress-bar" id="progressBar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <!-- Results -->
        <div class="results" id="results">
            <div class="results-header">
                <span>النتائج</span>
                <span>
                    <span class="stat-success">✓ <span id="successCount">0</span></span>
                    &nbsp;
                    <span class="stat-error">✗ <span id="errorCount">0</span></span>
                </span>
            </div>
            <div class="results-list" id="resultsList"></div>
        </div>
    </div>

    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script>
        const FLOW_API_URL = 'https://flow-companion.mivicle.app/rest/1/flow/start/order';
        
        let scanner = null;
        let isScanning = false;
        let scannedOrders = [];
        let lastCode = '';
        let lastTime = 0;

        // Current selections
        let currentSpecifier = 'shipped';
        let currentStatusLabel = 'Shipped';
        let currentIcon = '🚚';
        let currentCourier = 'Bosta';

        // Load saved data
        document.getElementById('apiToken').value = localStorage.getItem('api_token') || '';
        const saved = localStorage.getItem('scanned_orders');
        if (saved) {
            scannedOrders = JSON.parse(saved);
            renderList();
        }

        // Load saved status
        const savedStatus = localStorage.getItem('selected_status');
        if (savedStatus) {
            const status = JSON.parse(savedStatus);
            selectStatus(status.specifier, status.label, status.icon, false);
        }

        // Load saved courier
        const savedCourier = localStorage.getItem('selected_courier');
        if (savedCourier) {
            selectCourier(savedCourier, false);
        }

        // Save on change
        document.getElementById('apiToken').addEventListener('change', e => {
            localStorage.setItem('api_token', e.target.value);
        });

        // Manual input - auto-add when scanner gun finishes (no Enter needed)
        let inputTimeout = null;
        const scannerInput = document.getElementById('manualInput');
        
        scannerInput.addEventListener('input', (e) => {
            // Clear previous timeout
            if (inputTimeout) {
                clearTimeout(inputTimeout);
            }
            
            // Wait 150ms after last character - if no more input, assume scan is complete
            inputTimeout = setTimeout(() => {
                const code = scannerInput.value.trim();
                if (code.length >= 3) { // Minimum barcode length
                    if (!scannedOrders.includes(code)) {
                        addOrder(code);
                        scannerInput.value = '';
                        showToast();
                        
                        // Vibrate if on mobile
                        if (navigator.vibrate) {
                            navigator.vibrate(100);
                        }
                    } else {
                        // Already exists
                        scannerInput.value = '';
                        document.getElementById('scanStatus').textContent = '⚠️ موجود بالفعل: ' + code;
                        setTimeout(() => {
                            document.getElementById('scanStatus').textContent = 'جاهز للمسح';
                        }, 1500);
                    }
                }
                scannerInput.focus();
            }, 150);
        });

        // Also support Enter key as backup
        scannerInput.addEventListener('keypress', e => {
            if (e.key === 'Enter') {
                e.preventDefault();
                if (inputTimeout) {
                    clearTimeout(inputTimeout);
                }
                addManualEntry();
            }
        });

        // Keep focus on input field for scanner gun
        function focusInput() {
            document.getElementById('manualInput').focus();
        }

        // Auto-focus on page load
        window.addEventListener('load', focusInput);
        
        // Re-focus when clicking anywhere on the page (for scanner gun convenience)
        document.addEventListener('click', (e) => {
            // Don't refocus if clicking on buttons or other inputs
            if (e.target.tagName !== 'BUTTON' && e.target.tagName !== 'INPUT') {
                setTimeout(focusInput, 100);
            }
        });

        function selectStatus(specifier, label, icon, save = true) {
            currentSpecifier = specifier;
            currentStatusLabel = label;
            currentIcon = icon;

            // Update buttons
            document.querySelectorAll('.status-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelector(`.status-btn.${specifier}`).classList.add('active');

            // Update summary
            document.getElementById('summaryStatus').textContent = `${icon} ${label}`;

            // Update action button
            const btn = document.getElementById('updateBtn');
            btn.className = `btn-primary ${specifier}`;

            // Hide/show courier section based on status
            const courierCard = document.getElementById('courierCard');
            const courierSummary = document.getElementById('courierRow');
            
            if (specifier === 'ready-to-ship') {
                courierCard.style.display = 'none';
                courierSummary.style.display = 'none';
            } else {
                courierCard.style.display = 'block';
                courierSummary.style.display = 'flex';
            }

            // Save selection
            if (save) {
                localStorage.setItem('selected_status', JSON.stringify({
                    specifier, label, icon
                }));
            }
        }

        function selectCourier(element, save = true) {
            let courier, btnElement;
            
            // Handle both element click and load from storage
            if (typeof element === 'string') {
                courier = element;
                btnElement = document.querySelector(`.courier-btn[data-courier="${courier}"]`);
            } else {
                btnElement = element;
                courier = element.getAttribute('data-courier');
            }
            
            currentCourier = courier;

            // Update buttons
            document.querySelectorAll('.courier-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            if (btnElement) {
                btnElement.classList.add('active');
            }

            // Update summary
            document.getElementById('summaryCourier').textContent = `🛵 ${courier}`;

            // Save selection
            if (save) {
                localStorage.setItem('selected_courier', courier);
            }
        }

        function toggleSettings() {
            document.getElementById('settings').classList.toggle('active');
        }

        function toggleScanner() {
            if (isScanning) {
                stopScanner();
            } else {
                startScanner();
            }
        }

        function startScanner() {
            const btn = document.getElementById('scannerBtn');
            const status = document.getElementById('scanStatus');
            
            scanner = new Html5Qrcode("reader");
            
            scanner.start(
                { facingMode: "environment" },
                {
                    fps: 10,
                    qrbox: { width: 250, height: 100 },
                    aspectRatio: 1.5,
                    formatsToSupport: [
                        Html5QrcodeSupportedFormats.CODE_128,
                        Html5QrcodeSupportedFormats.CODE_39,
                        Html5QrcodeSupportedFormats.EAN_13,
                        Html5QrcodeSupportedFormats.EAN_8,
                        Html5QrcodeSupportedFormats.UPC_A,
                        Html5QrcodeSupportedFormats.UPC_E,
                        Html5QrcodeSupportedFormats.QR_CODE
                    ]
                },
                onScanSuccess,
                onScanError
            ).then(() => {
                isScanning = true;
                btn.textContent = '⏹️ إيقاف المسح';
                btn.classList.add('stop');
                status.textContent = 'جاري المسح... وجّه الكاميرا للباركود';
            }).catch(err => {
                status.textContent = 'خطأ: ' + err;
            });
        }

        function stopScanner() {
            if (scanner) {
                scanner.stop().then(() => {
                    scanner.clear();
                    isScanning = false;
                    document.getElementById('scannerBtn').textContent = '📷 بدء المسح';
                    document.getElementById('scannerBtn').classList.remove('stop');
                    document.getElementById('scanStatus').textContent = 'تم الإيقاف';
                });
            }
        }

        function onScanSuccess(code) {
            const now = Date.now();
            
            if (code === lastCode && now - lastTime < 2000) {
                return;
            }
            
            lastCode = code;
            lastTime = now;
            
            if (!scannedOrders.includes(code)) {
                addOrder(code);
                showToast();
                
                if (navigator.vibrate) {
                    navigator.vibrate(100);
                }
                
                document.getElementById('scanStatus').textContent = '✓ تم: ' + code;
                document.getElementById('scanStatus').classList.add('success');
                
                setTimeout(() => {
                    document.getElementById('scanStatus').textContent = 'جاري المسح...';
                    document.getElementById('scanStatus').classList.remove('success');
                }, 1500);
            } else {
                document.getElementById('scanStatus').textContent = '⚠️ موجود بالفعل: ' + code;
            }
        }

        function onScanError(err) {
            // Ignore
        }

        function addOrder(code) {
            scannedOrders.unshift(code);
            saveOrders();
            renderList(true);
            updateSummaryCount();
        }

        function removeOrder(code) {
            scannedOrders = scannedOrders.filter(o => o !== code);
            saveOrders();
            renderList();
            updateSummaryCount();
        }

        function clearList() {
            if (confirm('مسح كل الأوردرات؟')) {
                scannedOrders = [];
                saveOrders();
                renderList();
                updateSummaryCount();
            }
        }

        function saveOrders() {
            localStorage.setItem('scanned_orders', JSON.stringify(scannedOrders));
        }

        function updateSummaryCount() {
            document.getElementById('count').textContent = scannedOrders.length;
            document.getElementById('summaryCount').textContent = scannedOrders.length;
        }

        function renderList(isNew = false) {
            const list = document.getElementById('scannedList');
            document.getElementById('count').textContent = scannedOrders.length;
            
            if (scannedOrders.length === 0) {
                list.innerHTML = '<div class="empty-list">لم يتم مسح أي باركود بعد</div>';
                return;
            }
            
            list.innerHTML = scannedOrders.map((order, i) => `
                <div class="scanned-item ${i === 0 && isNew ? 'new' : ''}">
                    <span>${order}</span>
                    <button class="remove-btn" onclick="removeOrder('${order}')">✕</button>
                </div>
            `).join('');
        }

        function addManualEntry() {
            const input = document.getElementById('manualInput');
            const code = input.value.trim();
            
            if (code && !scannedOrders.includes(code)) {
                addOrder(code);
                input.value = '';
                showToast();
            } else if (scannedOrders.includes(code)) {
                // Already exists - clear and show message
                input.value = '';
                document.getElementById('scanStatus').textContent = '⚠️ موجود بالفعل: ' + code;
                setTimeout(() => {
                    document.getElementById('scanStatus').textContent = 'جاهز للمسح';
                }, 1500);
            }
            
            // Always refocus for next scan
            input.focus();
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 1000);
        }

        async function startUpdate() {
            const token = document.getElementById('apiToken').value.trim();
            
            if (!token) {
                alert('أدخل API Token في الإعدادات');
                toggleSettings();
                return;
            }
            
            if (scannedOrders.length === 0) {
                alert('لا توجد أوردرات');
                return;
            }

            // Confirm action
            let confirmMsg;
            if (currentSpecifier === 'ready-to-ship') {
                confirmMsg = `هل تريد تحديث ${scannedOrders.length} أوردر؟\n\nالحالة: ${currentStatusLabel}\n(سيتم إزالة المندوب)`;
            } else {
                confirmMsg = `هل تريد تحديث ${scannedOrders.length} أوردر؟\n\nالحالة: ${currentStatusLabel}\nالمندوب: ${currentCourier}`;
            }
            
            if (!confirm(confirmMsg)) {
                return;
            }
            
            const btn = document.getElementById('updateBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> جاري التحديث...';
            
            document.getElementById('progressBar').classList.add('active');
            document.getElementById('results').classList.add('active');
            
            const resultsList = document.getElementById('resultsList');
            resultsList.innerHTML = scannedOrders.map(order => `
                <div class="result-item" data-order="${order}">
                    <span>${order}</span>
                    <span class="result-status result-pending">⏳</span>
                </div>
            `).join('');
            
            let success = 0, errors = 0;
            
            for (let i = 0; i < scannedOrders.length; i++) {
                const order = scannedOrders[i];
                
                try {
                    // Build request body
                    const requestBody = {
                        itemId: order,
                        specifier: currentSpecifier
                    };
                    
                    // Only add courier if NOT ready-to-ship
                    if (currentSpecifier !== 'ready-to-ship') {
                        requestBody.additionalParameters = {
                            stringParameter: currentCourier
                        };
                    }
                    
                    const response = await fetch(FLOW_API_URL, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `bearer ${token}`
                        },
                        body: JSON.stringify(requestBody)
                    });
                    
                    if (response.ok) {
                        updateResult(order, 'success', '✓');
                        success++;
                    } else {
                        updateResult(order, 'error', '✗');
                        errors++;
                    }
                } catch (e) {
                    updateResult(order, 'error', '✗');
                    errors++;
                }
                
                document.getElementById('progressFill').style.width = `${((i+1)/scannedOrders.length)*100}%`;
                document.getElementById('successCount').textContent = success;
                document.getElementById('errorCount').textContent = errors;
                
                await new Promise(r => setTimeout(r, 300));
            }
            
            btn.disabled = false;
            btn.innerHTML = `🚀 تحديث الكل`;
            
            if (errors === 0) {
                let successMsg;
                if (currentSpecifier === 'ready-to-ship') {
                    successMsg = `✅ تم تحديث ${success} أوردر بنجاح!\n\nالحالة: ${currentStatusLabel}`;
                } else {
                    successMsg = `✅ تم تحديث ${success} أوردر بنجاح!\n\nالحالة: ${currentStatusLabel}\nالمندوب: ${currentCourier}`;
                }
                alert(successMsg);
                scannedOrders = [];
                saveOrders();
                renderList();
                updateSummaryCount();
            } else {
                alert(`تم: ${success} ناجح، ${errors} فشل`);
            }
        }

        function updateResult(order, status, text) {
            const item = document.querySelector(`[data-order="${order}"] .result-status`);
            if (item) {
                item.className = `result-status result-${status}`;
                item.textContent = text;
            }
        }

        // Initial summary count
        updateSummaryCount();
    </script>
</body>
</html>
